name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Install Conda
        uses: s-weigand/setup-conda@v1
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install
      - name: Run tests
        run: |
          uv run pytest tests
      - name: Run ruff
        run: |
          uv run ruff check
