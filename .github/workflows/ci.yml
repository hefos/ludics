name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Install Conda
        uses: s-weigand/setup-conda@v1
      - name: Install requirements
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt
      - name: Run tests
        run: |
          uv run pytest tests
      - name: Run black
        run: |
          uv run ruff check
